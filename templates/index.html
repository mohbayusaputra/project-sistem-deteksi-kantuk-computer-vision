<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>Sistem Deteksi Kantuk - Proyek CV</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #07090f; 
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .font-tech { font-family: 'Rajdhani', sans-serif; }

        .glass-box {
            background: rgba(15, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }

        /* Ornamen Sudut Kamera */
        .corner-bracket {
            position: absolute; width: 30px; height: 30px; border-color: #06b6d4; border-style: solid; z-index: 10;
        }
        .tl { top: 10px; left: 10px; border-width: 3px 0 0 3px; }
        .tr { top: 10px; right: 10px; border-width: 3px 3px 0 0; }
        .bl { bottom: 10px; left: 10px; border-width: 0 0 3px 3px; }
        .br { bottom: 10px; right: 10px; border-width: 0 3px 3px 0; }

        /* Animasi Wiper Mobil */
        .wiper-blade {
            position: absolute;
            bottom: -20%;
            left: 50%;
            width: 12px;
            height: 150%;
            background: #111;
            border-radius: 10px;
            transform-origin: bottom center;
            z-index: 60;
            box-shadow: -5px 0 15px rgba(0,0,0,0.8);
            animation: wipe-action 1.2s infinite ease-in-out alternate;
        }
        .wiper-arm {
            position: absolute;
            bottom: -20%;
            left: 49%;
            width: 25px;
            height: 40%;
            background: #000;
            transform-origin: bottom center;
            z-index: 59;
            animation: wipe-action 1.2s infinite ease-in-out alternate;
        }

        @keyframes wipe-action {
            0% { transform: rotate(-75deg); }
            100% { transform: rotate(75deg); }
        }

        /* Efek Nunduk (Fokus hilang) */
        .scan-line {
            position: absolute; width: 100%; height: 4px; background: rgba(234, 179, 8, 0.8);
            box-shadow: 0 0 15px rgba(234, 179, 8, 1); animation: scan-up-down 2s infinite linear;
        }
        @keyframes scan-up-down {
            0% { top: 0%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Sistem Semprotan Air */
        .water-jet {
            position: absolute;
            bottom: -10px;
            width: 6px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.8), rgba(147, 197, 253, 0.5), transparent);
            filter: blur(1px);
            transform-origin: bottom center;
            z-index: 55;
        }
        
        .left-jet { left: 25%; animation: spray-left 1s infinite ease-out; }
        .center-jet { left: 50%; transform: translateX(-50%); animation: spray-center 0.9s infinite ease-out; }
        .right-jet { right: 25%; animation: spray-right 1.1s infinite ease-out; }

        @keyframes spray-left {
            0% { height: 0; opacity: 0; transform: rotate(-18deg); }
            15% { height: 85%; opacity: 1; }
            40% { height: 95%; opacity: 0.6; }
            70% { opacity: 0; }
            100% { height: 95%; opacity: 0; }
        }

        @keyframes spray-center {
            0% { height: 0; opacity: 0; transform: rotate(2deg); }
            12% { height: 90%; opacity: 1; }
            35% { height: 98%; opacity: 0.6; }
            65% { opacity: 0; }
            100% { height: 98%; opacity: 0; }
        }

        @keyframes spray-right {
            0% { height: 0; opacity: 0; transform: rotate(15deg); }
            20% { height: 80%; opacity: 1; }
            45% { height: 92%; opacity: 0.6; }
            75% { opacity: 0; }
            100% { height: 92%; opacity: 0; }
        }
    </style>
    </head>
    <body
        class="text-white min-h-screen flex flex-col p-3 md:p-6 overflow-hidden">

        <audio id="audioTidur" src="/static/alarm.mp3" preload="auto"></audio>
        <audio id="audioNunduk" src="/static/menghadap.mp3"
            preload="auto"></audio>

        <div class="max-w-7xl mx-auto w-full h-full flex-1 flex flex-col gap-4">

            <header
                class="glass-box rounded-2xl p-4 md:p-5 flex flex-col md:flex-row justify-between items-center gap-4 shrink-0">
                <div>
                    <h1
                        class="font-tech text-2xl md:text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 tracking-wide uppercase">
                        Sistem Deteksi Kantuk
                    </h1>
                    <p
                        class="text-cyan-600/80 text-xs md:text-sm font-mono mt-1">Project
                        Computer Vision</p>
                </div>

                <div id="statusBadge"
                    class="w-full md:w-auto px-6 py-2 rounded-lg bg-green-500/10 text-green-400 border border-green-500/50 font-tech font-bold text-lg md:text-xl tracking-widest text-center flex items-center justify-center gap-3">
                    <span
                        class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></span>
                    SISTEM AMAN
                </div>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 flex-1 min-h-0">

                <div
                    class="lg:col-span-3 glass-box rounded-2xl relative overflow-hidden flex flex-col border-2 border-slate-800 min-h-[350px] lg:min-h-full">

                    <div class="corner-bracket tl"></div>
                    <div class="corner-bracket tr"></div>
                    <div class="corner-bracket bl"></div>
                    <div class="corner-bracket br"></div>

                    <video id="videoElement" autoplay muted playsinline
                        class="absolute inset-0 w-full h-full object-cover z-0 transform -scale-x-100"></video>
                    <canvas id="canvasElement" class="hidden"></canvas>

                    <div id="waterSplash"
                        class="hidden absolute inset-0 z-40 overflow-hidden rounded-xl bg-slate-900/20 backdrop-blur-lg flex flex-col items-center justify-center text-center p-4">

                        <div class="water-jet left-jet"></div>
                        <div class="water-jet center-jet"></div>
                        <div class="water-jet right-jet"></div>

                        <div class="wiper-arm"></div>
                        <div class="wiper-blade"></div>

                        <div class="z-50 relative">
                            <h2
                                class="font-tech text-6xl md:text-9xl font-black text-white tracking-tighter drop-shadow-[0_0_20px_rgba(255,255,255,0.6)] animate-bounce">BANGUN!</h2>
                            <p
                                class="mt-2 bg-red-600 px-6 py-2 rounded-full font-bold text-white text-sm md:text-xl border border-red-400 shadow-[0_0_20px_#dc2626]">PENGEMUDI
                                TERTIDUR</p>
                        </div>
                    </div>

                    <div id="alertOverlay"
                        class="hidden absolute inset-0 z-30 rounded-xl overflow-hidden">
                        <div
                            class="absolute inset-0 border-[4px] border-yellow-500/80"></div>
                        <div
                            class="absolute inset-0 bg-yellow-900/30 backdrop-blur-[2px]"></div>
                        <div class="scan-line"></div>
                        <div
                            class="absolute inset-0 flex items-center justify-center">
                            <span
                                class="font-tech text-3xl md:text-5xl font-black text-yellow-400 bg-black/80 px-8 py-3 rounded-lg border border-yellow-500 shadow-[0_0_30px_rgba(234,179,8,0.5)]">
                                FOKUS KE JALAN
                            </span>
                        </div>
                    </div>

                    <div
                        class="absolute bottom-4 right-4 bg-black/70 px-3 py-1.5 rounded text-[10px] md:text-xs font-mono text-cyan-400 border border-cyan-900 flex flex-col items-end z-20">
                        <span>FPS: 30.00</span>
                        <span class="text-gray-400">RES: 640x480</span>
                    </div>
                </div>

                <aside
                    class="lg:col-span-1 glass-box rounded-2xl flex flex-col h-full overflow-hidden">
                    <div class="p-5 flex flex-col h-full w-full">
                        <h3
                            class="font-tech text-cyan-500 font-bold uppercase tracking-widest text-sm mb-3 border-b border-cyan-900/50 pb-2 shrink-0">
                            Activity Log
                        </h3>
                        <div id="logBox"
                            class="flex-1 overflow-y-auto text-[10px] md:text-xs font-mono space-y-2 pr-2 pb-2">
                            <p class="text-cyan-500">> Memulai Sistem...</p>
                            <p class="text-gray-400">> Kamera Terhubung.</p>
                            <p class="text-gray-400">> Model AI Hybrid
                                Dimuat.</p>
                        </div>
                    </div>
                </aside>

            </div>
        </div>

        <script>
        const audioTidur = document.getElementById('audioTidur');
        const audioNunduk = document.getElementById('audioNunduk');
        const statusBadge = document.getElementById('statusBadge');
        const waterSplash = document.getElementById('waterSplash');
        const alertOverlay = document.getElementById('alertOverlay');
        const logBox = document.getElementById('logBox');

        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');
        const ctx = canvasElement.getContext('2d');

        // === KODE PEMBUKA GEMBOK SUARA BROWSER ===
        document.body.addEventListener('click', () => {
            // Mainkan lalu pause secepat kilat untuk mendapat izin browser
            audioTidur.play().then(() => {
                audioTidur.pause();
                audioTidur.currentTime = 0;
            }).catch(e => console.log("Audio tertahan", e));

            audioNunduk.play().then(() => {
                audioNunduk.pause();
                audioNunduk.currentTime = 0;
            }).catch(e => console.log("Audio tertahan", e));
            
            addLog("Sistem audio telah diaktifkan user.", "normal");
        }, { once: true }); // { once: true } artinya event ini cuma jalan 1 kali aja
        // =========================================

        let lastNgantukTime = 0; 
        let isCameraReady = false;

        function addLog(msg, type = 'normal') {
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute:'2-digit', second:'2-digit' });
            let color = 'text-gray-400';
            if(type === 'danger') color = 'text-red-400 font-bold';
            if(type === 'warn') color = 'text-yellow-400';
            
            logBox.innerHTML += `<p class="${color}">[${time}] > ${msg}</p>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 1. Meminta izin kamera - SUDAH DIPERBAIKI UNTUK HP (Muted & Kamera Depan)
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user" }, 
            audio: false 
        })
        .then(stream => {
            videoElement.srcObject = stream;
            videoElement.onloadedmetadata = () => {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
                isCameraReady = true;
                addLog("Kamera berhasil diakses.", "normal");
            };
        })
        .catch(err => {
            addLog("Gagal mengakses kamera! Pastikan izin diberikan.", "danger");
            console.error("Camera error:", err);
        });

        // 2. Kirim frame dari kamera ke Python setiap 300ms
        setInterval(() => {
            if (!isCameraReady) return;

            // Gambar video ke canvas, lalu ubah ke string Base64 (kualitas 50% biar internet ga berat)
            ctx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
            const frameBase64 = canvasElement.toDataURL('image/jpeg', 0.5);

            fetch('/process_frame', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: frameBase64 })
            })
            .then(res => res.json())
            .then(data => {
                const currentTime = Date.now();

                if (data.ngantuk) lastNgantukTime = currentTime; 

                // Tahan animasi 2 detik biar gak kedap-kedip manja
                const isNgantukActive = data.ngantuk || (currentTime - lastNgantukTime < 2000);

                if (isNgantukActive) {
                    statusBadge.className = "w-full md:w-auto px-6 py-2 rounded-lg bg-red-600/20 text-red-500 border border-red-500 font-tech font-bold text-lg md:text-xl tracking-widest text-center flex items-center justify-center gap-3 animate-pulse shadow-[0_0_15px_#dc2626]";
                    statusBadge.innerHTML = '<span class="w-3 h-3 rounded-full bg-red-500"></span> BAHAYA TERTIDUR';
                    
                    // MEMUNCULKAN EFEK AIR DAN WIPER NYATA
                    waterSplash.classList.remove('hidden');
                    alertOverlay.classList.add('hidden');
                    
                    if(data.ngantuk && Math.random() > 0.85) addLog("Peringatan: Pengemudi tertidur!", "danger");
                    if (audioTidur.paused) audioTidur.play();
                } 
                else if (data.nunduk) {
                    statusBadge.className = "w-full md:w-auto px-6 py-2 rounded-lg bg-yellow-500/10 text-yellow-400 border border-yellow-500/50 font-tech font-bold text-lg md:text-xl tracking-widest text-center flex items-center justify-center gap-3";
                    statusBadge.innerHTML = '<span class="w-3 h-3 rounded-full bg-yellow-500"></span> TIDAK FOKUS';
                    waterSplash.classList.add('hidden');
                    alertOverlay.classList.remove('hidden');
                    
                    if(Math.random() > 0.9) addLog("Peringatan: Wajah tidak terdeteksi", "warn");
                    if (audioNunduk.paused) audioNunduk.play();
                    audioTidur.pause(); audioTidur.currentTime = 0;
                } 
                else {
                    statusBadge.className = "w-full md:w-auto px-6 py-2 rounded-lg bg-green-500/10 text-green-400 border border-green-500/50 font-tech font-bold text-lg md:text-xl tracking-widest text-center flex items-center justify-center gap-3 transition-colors duration-300";
                    statusBadge.innerHTML = '<span class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]"></span> SISTEM AMAN';
                    waterSplash.classList.add('hidden');
                    alertOverlay.classList.add('hidden');
                    
                    audioTidur.pause(); audioTidur.currentTime = 0;
                    audioNunduk.pause(); audioNunduk.currentTime = 0;
                }
            })
            .catch(err => console.error("Error API:", err));
        }, 300);
        </script>
    </body>
</html>
